<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Non-Semantic HTML Mock</title>
  </head>
  <body>
    <div id="wrapper">
      <div class="top-bar">
        <span class="logo">Logo</span>
        <span class="nav-links">Links here</span>
      </div>
      <div class="content">
        <div class="post">
          <div class="title-row">
            <h2>Div-Based Article Title</h2>
          </div>
          <div class="body">
            <p>
              This page uses only <strong>div</strong> and <span>span</span> for
              layout.
            </p>
            <p>
              No <code>article</code>, <code>section</code>, or
              <code>main</code> tags.
            </p>
            <div class="list">
              <div class="item">Item one</div>
              <div class="item">Item two</div>
              <div class="item">Item three</div>
            </div>
            <div class="code-block">
              <pre><code>console.log('div soup');</code></pre>
            </div>
          </div>
        </div>
      </div>
      <div class="bottom">
        <span>Footer text in a div</span>
      </div>
    </div>
  </body>
</html>
